name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject password hash
        run: |
          sed -i "s|__PASSWORD_HASH__|${{ secrets.PASSWORD_HASH }}|g" docs/src/login.js

